name: Build Other Repository Rust

on: 
  workflow_dispatch:
    inputs:
      project_path:
        description: '仓库路径'
        required: true
        default: 'ajmwagar/merino'
      bin_name:
        description: '编译后的二进制名称'
        required: true
        default: 'merino'        

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout other repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.project_path }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check ENV
        run: |
          pwd
          ls
          ls -l 
          df -h

      # 3. 缓存 Cargo 依赖（加速编译，避免重复下载）
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      #  编译项目（--release 生成优化后的发布版本）          
      - name: Build
        env: 
          image: ${{ inputs.bin_name }}
        run: |
            pwd
            ls
            cargo build --release --verbose
            ls
            ls -l target
            ls -l target/release
            # mv *.tar.gz ../


      - name: Upload Bin as release assets
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: RUST-BIN-AMD64
          files: ${{ github.workspace }}/target/release/${{ env.BIN_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIN_NAME: ${{ inputs.bin_name }}
  
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: rust-artifact
      #     path: target/release/${{ env.BIN_NAME }}
